<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your SPACEX Trading Academy account to access your courses and dashboard.">
  <meta name="theme-color" content="#0a0a0f">
  <title>Sign In — SPACEX Trading Academy</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2300FF88'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial' font-weight='bold' font-size='18' fill='%230a0a0f'>S</text></svg>">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
      position: relative;
      overflow: hidden;
    }
    .auth-page::before {
      content: '';
      position: absolute;
      top: -30%;
      right: -20%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,255,136,0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .auth-page::after {
      content: '';
      position: absolute;
      bottom: -20%;
      left: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255,215,0,0.05) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .auth-card {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 2;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: var(--space-10);
    }
    .auth-logo a {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-family: var(--font-heading);
      font-size: var(--text-2xl);
      font-weight: var(--font-weight-extrabold);
      color: var(--color-text-primary);
    }
    .auth-logo .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--gradient-neon);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-lg);
    }
    .auth-logo span {
      background: var(--gradient-neon);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .auth-form-card {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur-lg));
      -webkit-backdrop-filter: blur(var(--glass-blur-lg));
      border: var(--glass-border);
      border-radius: var(--radius-2xl);
      padding: var(--space-10);
      position: relative;
      overflow: hidden;
    }
    .auth-form-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--gradient-neon);
    }
    .auth-title {
      text-align: center;
      margin-bottom: var(--space-2);
      font-size: var(--text-2xl);
    }
    .auth-subtitle {
      text-align: center;
      color: var(--color-text-tertiary);
      font-size: var(--text-sm);
      margin-bottom: var(--space-8);
    }
    .auth-form .btn {
      width: 100%;
      margin-top: var(--space-4);
    }
    .auth-footer {
      text-align: center;
      margin-top: var(--space-6);
      font-size: var(--text-sm);
      color: var(--color-text-tertiary);
    }
    .auth-footer a {
      color: var(--color-neon);
      font-weight: var(--font-weight-semibold);
    }
    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-4);
    }
    .form-row label {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      color: var(--color-text-tertiary);
      cursor: pointer;
    }
    .form-row a {
      font-size: var(--text-sm);
      color: var(--color-neon);
    }
    .form-checkbox {
      width: 16px;
      height: 16px;
      accent-color: var(--color-neon);
    }
    .social-login {
      display: flex;
      gap: var(--space-3);
      margin-top: var(--space-6);
    }
    .social-btn {
      flex: 1;
      padding: var(--space-3) var(--space-4);
      background: var(--color-surface-1);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      color: var(--color-text-secondary);
      font-size: var(--text-sm);
      font-weight: var(--font-weight-medium);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      cursor: pointer;
      transition: all var(--duration-normal) var(--ease-smooth);
    }
    .social-btn:hover {
      background: var(--color-surface-2);
      border-color: var(--color-border-hover);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="index.html">
          <div class="logo-icon">⚡</div>
          <span>SPACEX</span>
        </a>
      </div>

      <div class="auth-form-card">
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Sign in to access your trading dashboard</p>

        <form class="auth-form" id="loginForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="loginEmail">Email Address</label>
            <input type="email" id="loginEmail" class="form-input" placeholder="you@example.com" required autocomplete="email">
          </div>

          <div class="form-group">
            <label class="form-label" for="loginPassword">Password</label>
            <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required autocomplete="current-password">
          </div>

          <div class="form-row">
            <label>
              <input type="checkbox" class="form-checkbox" id="rememberMe">
              Remember me
            </label>
            <a href="#">Forgot password?</a>
          </div>

          <button type="submit" class="btn btn-primary btn-lg" id="loginSubmit">
            Sign In
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </form>

        <div class="divider-text" style="margin-top: var(--space-6);">or continue with</div>

        <div class="social-login">
          <button class="social-btn">
            <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Google
          </button>
          <button class="social-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
            GitHub
          </button>
        </div>

        <div class="auth-footer">
          Don't have an account? <a href="register.html">Create one</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
