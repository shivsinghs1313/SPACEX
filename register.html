<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your SPACEX Trading Academy account and start your journey to consistent trading.">
  <meta name="theme-color" content="#0a0a0f">
  <title>Create Account — SPACEX Trading Academy</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2300FF88'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial' font-weight='bold' font-size='18' fill='%230a0a0f'>S</text></svg>">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
      position: relative;
      overflow: hidden;
    }
    .auth-page::before {
      content: '';
      position: absolute;
      top: -30%;
      left: -20%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,255,136,0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .auth-page::after {
      content: '';
      position: absolute;
      bottom: -20%;
      right: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255,215,0,0.05) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .auth-card {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 2;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: var(--space-8);
    }
    .auth-logo a {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-family: var(--font-heading);
      font-size: var(--text-2xl);
      font-weight: var(--font-weight-extrabold);
      color: var(--color-text-primary);
    }
    .auth-logo .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--gradient-neon);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-lg);
    }
    .auth-logo span {
      background: var(--gradient-neon);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .auth-form-card {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur-lg));
      -webkit-backdrop-filter: blur(var(--glass-blur-lg));
      border: var(--glass-border);
      border-radius: var(--radius-2xl);
      padding: var(--space-10);
      position: relative;
      overflow: hidden;
    }
    .auth-form-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--gradient-neon);
    }
    .auth-title {
      text-align: center;
      margin-bottom: var(--space-2);
      font-size: var(--text-2xl);
    }
    .auth-subtitle {
      text-align: center;
      color: var(--color-text-tertiary);
      font-size: var(--text-sm);
      margin-bottom: var(--space-8);
    }
    .auth-form .btn {
      width: 100%;
      margin-top: var(--space-4);
    }
    .auth-footer {
      text-align: center;
      margin-top: var(--space-6);
      font-size: var(--text-sm);
      color: var(--color-text-tertiary);
    }
    .auth-footer a {
      color: var(--color-neon);
      font-weight: var(--font-weight-semibold);
    }
    .password-strength {
      margin-top: var(--space-2);
    }
    .strength-track {
      height: 4px;
      background: var(--color-surface-1);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      width: 0;
      border-radius: var(--radius-full);
      transition: all var(--duration-normal) var(--ease-smooth);
    }
    .strength-label {
      display: flex;
      justify-content: flex-end;
      margin-top: var(--space-1);
      font-size: var(--text-xs);
      font-weight: var(--font-weight-medium);
    }
    .terms-group {
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      margin-top: var(--space-4);
      margin-bottom: var(--space-4);
    }
    .terms-group input {
      margin-top: 3px;
      width: 16px;
      height: 16px;
      accent-color: var(--color-neon);
      flex-shrink: 0;
    }
    .terms-group label {
      font-size: var(--text-sm);
      color: var(--color-text-tertiary);
      line-height: 1.4;
    }
    .terms-group label a {
      color: var(--color-neon);
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="index.html">
          <div class="logo-icon">⚡</div>
          <span>SPACEX</span>
        </a>
      </div>

      <div class="auth-form-card">
        <h2 class="auth-title">Create Your Account</h2>
        <p class="auth-subtitle">Join 5,000+ traders transforming their results</p>

        <form class="auth-form" id="registerForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="registerName">Full Name</label>
            <input type="text" id="registerName" class="form-input" placeholder="John Doe" required autocomplete="name">
          </div>

          <div class="form-group">
            <label class="form-label" for="registerEmail">Email Address</label>
            <input type="email" id="registerEmail" class="form-input" placeholder="you@example.com" required autocomplete="email">
          </div>

          <div class="form-group">
            <label class="form-label" for="registerPassword">Password</label>
            <input type="password" id="registerPassword" class="form-input" placeholder="Min. 8 characters" required autocomplete="new-password">
            <div class="password-strength">
              <div class="strength-track">
                <div class="strength-fill" id="strengthBar"></div>
              </div>
              <div class="strength-label">
                <span id="strengthText"></span>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="registerConfirmPassword">Confirm Password</label>
            <input type="password" id="registerConfirmPassword" class="form-input" placeholder="Repeat your password" required autocomplete="new-password">
          </div>

          <div class="terms-group">
            <input type="checkbox" id="termsAccept" required>
            <label for="termsAccept">
              I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
            </label>
          </div>

          <button type="submit" class="btn btn-primary btn-lg" id="registerSubmit">
            Create Account
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </form>

        <div class="auth-footer">
          Already have an account? <a href="login.html">Sign in</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
